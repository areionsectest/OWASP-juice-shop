name: Snyk SCA Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  snyk-sca:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@master

      # Scan root package-lock.json (Juice Shop dependencies)
      - name: Run Snyk on root package-lock.json
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=package-lock.json --severity-threshold=high --org=94950c75-721b-4627-9aee-cb9de30f4de0

      # Monitor root package in Snyk dashboard
      - name: Monitor root package in Snyk dashboard
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --file=package-lock.json --org=94950c75-721b-4627-9aee-cb9de30f4de0

      # Scan sca-test/package-lock.json (GitHub Action only)
      - name: Run Snyk on sca-test/package-lock.json
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=sca-test/package-lock.json --severity-threshold=high --org=94950c75-721b-4627-9aee-cb9de30f4de0

      # Monitor sca-test package in Snyk dashboard
      - name: Monitor sca-test package in Snyk dashboard
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --file=sca-test/package-lock.json --org=94950c75-721b-4627-9aee-cb9de30f4de0
