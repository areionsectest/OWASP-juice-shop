name: Snyk SCA Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  snyk-sca:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@master

      # --- ROOT PACKAGE ---

      - name: Run Snyk on root package-lock.json
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=package-lock.json --severity-threshold=high --org=94950c75-721b-4627-9aee-cb9de30f4de0

      - name: Monitor root package in wiz-default
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --file=package-lock.json --org=94950c75-721b-4627-9aee-cb9de30f4de0

      - name: Monitor root package in annam-org-test
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --file=package-lock.json --org=3f8b7d94-37db-4355-b4a3-5fb20f6d9af8

      # --- SCA-TEST PACKAGE ---

      - name: Run Snyk on sca-test/package-lock.json
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=sca-test/package-lock.json --severity-threshold=high --org=94950c75-721b-4627-9aee-cb9de30f4de0

      - name: Monitor sca-test package in wiz-default
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --file=sca-test/package-lock.json --org=94950c75-721b-4627-9aee-cb9de30f4de0

      - name: Monitor sca-test package in annam-org-test
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --file=sca-test/package-lock.json --org=3f8b7d94-37db-4355-b4a3-5fb20f6d9af8
